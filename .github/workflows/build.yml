name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build APK
      run: |
        mkdir apk
        echo "WebView APK build placeholder" > apk/app.apk

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app
        path: apk/app.apk
